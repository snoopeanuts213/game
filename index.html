<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<title>テスト</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
	<style>
		body { 
			margin: 0;
			padding: 0;
			background-color: #0d1117; 
			overflow: hidden;
			touch-action: none;
			-webkit-user-select: none;
			user-select: none;
		}
    </style>
</head>
<body>

<script>
	function setup() {
		createCanvas(windowWidth, windowHeight);
		frameRate(3);
	}
	
	function windowResized() {
		resizeCanvas(windowWidth, windowHeight);
	}
	
	function draw() {
		background(15, 20, 30)
		stroke(89, 227, 222)
		noFill()
		rect(1,1,width-1,height-1)
		textSize(16);
   	textAlign(CENTER,CENTER);
		text(`${width},${height}`,width/2,height/2)
	}
	
	function drawLightning(x1, y1, x2, y2) {
		stroke(89, 227, 222);
		strokeWeight(random(1, 3.5));
		noFill();
		beginShape();
		vertex(x1, y1);
		let midY1 = random(y1, y2);
		let offsetX1 = random(-15, 15);
		vertex(x1 + offsetX1, midY1);
		let midY2 = random(y1, y2);
		let offsetX2 = random(-15, 15);
		vertex(x1 + offsetX2, midY2);
		vertex(x2, y2);
		endShape();
	}
</script>

</body>
</html>
